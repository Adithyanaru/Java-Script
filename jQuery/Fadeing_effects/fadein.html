<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button class="btn1"> click here to fade in</button>
    <div class="div1" style="width: 200px; height: 200px; background-color: red; display: none;"></div>
    <div class="div2" style="width: 200px; height: 200px; background-color: green; display: none;"></div>
    <div class="div3" style="width: 200px; height: 200px; background-color: blue; display: none;"></div>
    


    
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script>
        $(document).ready(function(){
            $(".btn1").click(function(){
                $(".div1").fadeIn();
                $(".div2").fadeIn(1000);
                $(".div3").fadeIn(2000);
            })
        })
    </script>
</body>
</html>
