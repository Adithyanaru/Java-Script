<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="margin-left: 500px;padding-top: 100px;">
        <button class="btn1"> click here to hide</button>
        <button class="btn2"> click here to show</button>
        <h1 class="demo">Indroduction to jQuery</h1>

    </div>


    
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script>
        $(document).ready(function(){
            $(".btn1").click(function(){
                $(".demo").hide();
            })
            $(".btn2").click(function(){
                $(".demo").show();
            })
        })
    </script>

</body>
</html>
