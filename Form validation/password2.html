<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"  
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div>
        <form method="post", onsubmit="return validateForm()" class="container-fluid mt-5">
            <input type="text" name="" id="name" placeholder="name" class="mb-5">
            <span id="name_error" style="color: red;"></span><br>
            <button class="btn" type="submit">Submit</button>
        </form>
    </div>


    <script>
        function validateForm() {
            let name = document.getElementById("name").value;
            document.getElementById("name_error").innerHTML = ""; // for clearing error message
            if (name === "") {
                document.getElementById("name_error").innerHTML = "Name should not be blank";
                return false;
            }
            else {
                alert("Form submitted successfully");
                return true;
            }
        }
    </script>
</body>
</html>
