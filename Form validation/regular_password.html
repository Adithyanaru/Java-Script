<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="box">
        <h2>Create Account</h2>

        <form method="post" onsubmit="return validatePassword()">



            <input type="password" name="password" id="password" placeholder="Password"><br>
            <span id="password_error" style="color: red;"></span><br>

            <input type="password" name="confirm_password" placeholder="Confirm Password" id="confirm_password"><br>
            <span id="confirm_password_error" style="color: red;"></span><br>
            <button type="submit">Register</button>
        </form>
    </div>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;

        }

        .box {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            justify-content: center;
        }

        input {
            width: 250px;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 250px;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            font-size: 16px;
        }
    </style>


<script>
    function validatePassword(){
        pass1 = document.getElementById("password").value;
        pass2 = document.getElementById("confirm_password").value;
        // regex for password validation
        pattern = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%]).{6,}$/;
        //clear error messages
        document.getElementById("password_error").innerHTML = "";
        document.getElementById("confirm_password_error").innerHTML = "";

        //pasword empty check
        if(pass1 == ""){
            document.getElementById("password_error").innerHTML = "Password is required";
            return false;
        }
        //strong password checking
       else if(!pattern.test(pass1)){
            document.getElementById("password_error").innerHTML = "Password must be at least 6 characters long and contain at least one digit, one lowercase letter, one uppercase letter, and one special character (@#$%)";
            return false;
        }
        // conform password empty check
       else if(pass2 == ""){
            document.getElementById("confirm_password_error").innerHTML = "Confirm Password is required";
            return false;
        }
        // confirm password matching check
      else  if(pass1 != pass2){
            document.getElementById("confirm_password_error").innerHTML = "Passwords do not match";
            return false;
        }
        // match checking
      else  {
           alert("Successfully Registered");
            return true;
        }

    }
</script>
</body>


</html>
